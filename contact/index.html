<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <meta name="description" content="Get in touch with Lucas García de Viedma Pérez. Data Architect & Entrepreneur.">

    <link rel="icon" type="image/png" sizes="32x32" href="../assets/logo/favicon-32x32.png">
    <link rel="icon" type="image/png" sizes="16x16" href="../assets/logo/favicon-16x16.png">
    <link rel="apple-touch-icon" sizes="180x180" href="../assets/logo/apple-touch-icon.png">
    <link rel="manifest" href="../assets/logo/site.webmanifest">

    <link rel="stylesheet" href="../styles.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Playfair+Display:wght@500;600;700&display=swap" rel="stylesheet">
</head>
<body>
    <header class="header">
        <nav class="nav">
            <a href="../" class="logo"><img src="../assets/logo/ico.svg" alt="Logo"></a>
            <input type="checkbox" id="nav-toggle" class="nav-toggle">
            <label for="nav-toggle" class="nav-toggle-label"><span></span></label>
            <ul class="nav-links">
                <li><a href="../">Home</a></li>
                <li><a href="../ventures/">Ventures & Projects</a></li>
                <li><a href="../about_me/">About me</a></li>
                <li><a href="../blog/">Blog</a></li>
                <li><a href="../contact/" class="active">Contact</a></li>
            </ul>
        </nav>
    </header>

    <main class="page-fade-in">
        <section class="contact">
            <div class="contact-content">
                <h2>Get in Touch</h2>
                <p>Let's talk about data, startups, or anything interesting.</p>

                <div class="contact-socials">
                    <a href="https://x.com/dataphagus" target="_blank" class="social-link" aria-label="X (Twitter)">
                        <svg viewBox="0 0 24 24" fill="currentColor"><path d="M18.244 2.25h3.308l-7.227 8.26 8.502 11.24H16.17l-5.214-6.817L4.99 21.75H1.68l7.73-8.835L1.254 2.25H8.08l4.713 6.231zm-1.161 17.52h1.833L7.084 4.126H5.117z"/></svg>
                    </a>
                    <a href="https://www.linkedin.com/in/lucas-garcia-de-viedma-p%C3%A9rez/" target="_blank" class="social-link" aria-label="LinkedIn">
                        <svg viewBox="0 0 24 24" fill="currentColor"><path d="M20.447 20.452h-3.554v-5.569c0-1.328-.027-3.037-1.852-3.037-1.853 0-2.136 1.445-2.136 2.939v5.667H9.351V9h3.414v1.561h.046c.477-.9 1.637-1.85 3.37-1.85 3.601 0 4.267 2.37 4.267 5.455v6.286zM5.337 7.433c-1.144 0-2.063-.926-2.063-2.065 0-1.138.92-2.063 2.063-2.063 1.14 0 2.064.925 2.064 2.063 0 1.139-.925 2.065-2.064 2.065zm1.782 13.019H3.555V9h3.564v11.452zM22.225 0H1.771C.792 0 0 .774 0 1.729v20.542C0 23.227.792 24 1.771 24h20.451C23.2 24 24 23.227 24 22.271V1.729C24 .774 23.2 0 22.222 0h.003z"/></svg>
                    </a>
                </div>

                <form class="contact-form" id="contact-form">
                    <div class="form-row">
                        <div class="form-group">
                            <input type="text" name="name" placeholder="Name" required>
                        </div>
                        <div class="form-group">
                            <input type="email" name="email" placeholder="Email" required>
                        </div>
                    </div>
                    <div class="form-group">
                        <textarea name="message" placeholder="Message" required></textarea>
                    </div>
                    <button type="submit" class="btn-submit">Send Message</button>
                </form>

                <p class="form-success" id="form-success" style="display:none; margin-top:1.5rem; color:var(--color-text-muted); font-size:15px;">
                    Thanks for reaching out! I'll get back to you soon.
                </p>
            </div>
        </section>
    </main>

    <script>
        // Google Form submission — replace FORM_ID and entry IDs once available
        const GOOGLE_FORM_URL = 'https://docs.google.com/forms/d/e/1FAIpQLSd_Friq51W0yOl46QIMhYLyAhEHqvEVZstNdFDzjWKmZ8rzNQ/formResponse';
        const ENTRY_NAME = 'entry.381919406';
        const ENTRY_EMAIL = 'entry.1108875652';
        const ENTRY_MESSAGE = 'entry.2075910683';

        document.getElementById('contact-form').addEventListener('submit', function(e) {
            e.preventDefault();

            const form = e.target;
            const data = new FormData();
            data.append(ENTRY_NAME, form.name.value);
            data.append(ENTRY_EMAIL, form.email.value);
            data.append(ENTRY_MESSAGE, form.message.value);

            fetch(GOOGLE_FORM_URL, {
                method: 'POST',
                mode: 'no-cors',
                body: data
            }).then(function() {
                form.style.display = 'none';
                document.getElementById('form-success').style.display = 'block';
            }).catch(function() {
                form.style.display = 'none';
                document.getElementById('form-success').style.display = 'block';
            });
        });
    </script>
</body>
</html>
